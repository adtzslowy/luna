name: Build & Release

on:
  push:
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]

jobs:
  build:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.runner }}
    strategy:
      matrix:
        include:
          - os: darwin-amd64
            runner: macos-13
            goos: darwin
            goarch: amd64
            ext: ""
          - os: darwin-arm64
            runner: macos-14
            goos: darwin
            goarch: arm64
            ext: ""
          - os: linux-amd64
            runner: ubuntu-latest
            goos: linux
            goarch: amd64
            ext: ""
          - os: windows-amd64
            runner: windows-latest
            goos: windows
            goarch: amd64
            ext: ".exe"

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.22'

      - name: Build
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          go build -ldflags="-s -w -X main.version=${{ github.ref_name }}" \
            -o luna-${{ matrix.os }}${{ matrix.ext }} ./cmd/luna

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: luna-${{ matrix.os }}
          path: luna-${{ matrix.os }}${{ matrix.ext }}

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            luna-darwin-amd64/luna-darwin-amd64
            luna-darwin-arm64/luna-darwin-arm64
            luna-linux-amd64/luna-linux-amd64
            luna-windows-amd64/luna-windows-amd64.exe
          generate_release_notes: true
          draft: false
